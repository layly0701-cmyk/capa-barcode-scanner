<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>상일비전 CAPA 바코드 스캔</title>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f4f6f8;
      color: # #17202a;
      font-family: Arial, "Noto Sans KR", sans-serif;
    }

    main {
      max-width: 560px;
      margin: auto;
      padding: 18px 14px 40px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .sub, .hint {
      color: #637083;
      font-size: 14px;
    }

    .card {
      background: #fff;
      padding: 16px;
      margin-bottom: 14px;
      border-radius: 14px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .06);
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
    }

    select, input {
      width: 100%;
      min-height: 48px;
      padding: 10px 12px;
      border: 1px solid #cfd6df;
      border-radius: 9px;
      background: #fff;
      font-size: 17px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 9px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .action {
      background: #edf1f5;
    }

    .action.selected {
      background: #fee500;
      outline: 2px solid #111;
    }

    .scan {
      width: 100%;
      margin-top: 10px;
      background: #293f8f;
      color: #fff;
    }

    .save {
      width: 100%;
      background: #111;
      color: #fff;
    }

    .hidden {
      display: none !important;
    }

    /* 카메라 영역 */
    #readerWrap {
      position: relative;
      width: 100%;
      min-height: 280px;
      margin-top: 12px;
      overflow: hidden;
      border-radius: 12px;
      background: #111;
    }

    #reader {
      width: 100%;
      min-height: 280px;
      background: #111;
    }

    #reader video {
      width: 100% !important;
      min-height: 280px;
      object-fit: cover;
    }

    /* 휴대폰에 항상 보이는 가로형 스캔 사각형 */
    #scanGuide {
      position: absolute;
      z-index: 20;
      top: 50%;
      left: 50%;
      width: 88%;
      height: 115px;
      transform: translate(-50%, -50%);
      border: 4px solid #fee500;
      border-radius: 12px;
      box-shadow:
        0 0 0 2000px rgba(0, 0, 0, .30),
        0 0 15px rgba(254, 229, 0, .8);
      pointer-events: none;
    }

    #scanGuide::before {
      content: "바코드를 이 사각형 안에 가로로 맞추세요";
      position: absolute;
      left: 50%;
      bottom: -36px;
      transform: translateX(-50%);
      width: 100%;
      color: #fff;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      text-shadow: 0 1px 3px #000;
    }

    #message {
      white-space: pre-line;
      line-height: 1.55;
    }

    .ok {
      background: #e9f8ef;
      color: #176b3a;
    }

    .error {
      background: #fff0f0;
      color: #a12626;
    }
  </style>
</head>

<body>
<main>
  <h1>CAPA 바코드 스캔</h1>
  <p class="sub">작업자와 작업을 선택한 뒤 제품 바코드를 조준하세요.</p>

  <section class="card">
    <label for="worker">작업자</label>
    <select id="worker">
      <option>불러오는 중...</option>
    </select>
  </section>

  <section class="card">
    <label>작업 종류</label>
    <div id="actions" class="actions"></div>
  </section>

  <section id="processBox" class="card hidden">
    <label for="process">중단·재시작 공정</label>
    <select id="process">
      <option value="">공정 선택</option>
      <option value="포선">포선</option>
      <option value="외장">외장</option>
    </select>
  </section>

  <section id="reasonBox" class="card hidden">
    <label for="reason">중단 사유</label>
    <select id="reason">
      <option value="">중단 사유 선택</option>
      <option>자재 대기</option>
      <option>사양 확인</option>
      <option>품질 확인</option>
      <option>설비·공구 문제</option>
      <option>타 작업 지원</option>
      <option>작업자 이석</option>
      <option>기타</option>
    </select>
  </section>

  <section class="card">
    <label for="barcode">제품 바코드</label>
    <input id="barcode"
           placeholder="예: Q829Z23S#1"
           autocomplete="off"
           autocapitalize="characters">

    <div id="readerWrap" class="hidden">
      <div id="reader"></div>
      <div id="scanGuide"></div>
    </div>

    <button id="scanButton" class="scan" type="button">
      카메라로 바코드 스캔
    </button>

    <button id="stopButton" class="scan hidden" type="button">
      카메라 닫기
    </button>

    <p class="hint">
      노란색 사각형 안에 라벨의 상단 바코드를 가로로 맞추세요.
    </p>
  </section>

  <button id="saveButton" class="save" type="button">
    작업 기록 저장
  </button>

  <section id="message" class="card hidden"></section>
</main>

<script>
const API_URL =
  'https://script.google.com/macros/s/AKfycbzyGn4TJU62xu_BxCyjsfHpba0KML1mqLzpQ3t4j57FUuMMNcYlzk6_t6gyEpexWVdhYg/exec';

const $ = id => document.getElementById(id);

let selectedAction =
  new URLSearchParams(location.search).get('action') || '';

let scanner = null;
let scannerRunning = false;
let scanCompleted = false;

/* 1차원 바코드 형식을 스캐너 생성 단계에서 지정 */
const BARCODE_FORMATS = [
  Html5QrcodeSupportedFormats.CODE_128,
  Html5QrcodeSupportedFormats.CODE_39,
  Html5QrcodeSupportedFormats.CODE_93,
  Html5QrcodeSupportedFormats.CODABAR,
  Html5QrcodeSupportedFormats.ITF,
  Html5QrcodeSupportedFormats.EAN_13,
  Html5QrcodeSupportedFormats.EAN_8,
  Html5QrcodeSupportedFormats.UPC_A,
  Html5QrcodeSupportedFormats.UPC_E
];

function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb =
      'capaCb' + Date.now() + Math.random().toString(36).slice(2);

    const script = document.createElement('script');

    const timer = setTimeout(() => {
      done(new Error('서버 응답 시간이 초과되었습니다.'));
    }, 15000);

    function done(value) {
      clearTimeout(timer);
      delete window[cb];
      script.remove();

      if (value instanceof Error) {
        reject(value);
      } else {
        resolve(value);
      }
    }

    window[cb] = data => done(data);

    script.onerror = () => {
      done(new Error('Google 시트 서버에 연결하지 못했습니다.'));
    };

    script.src =
      API_URL + '?' +
      new URLSearchParams({
        ...params,
        callback: cb
      });

    document.body.appendChild(script);
  });
}

jsonp({ api: 'initial' })
  .then(data => {
    if (!data.ok) throw new Error(data.error);
    init(data.data);
  })
  .catch(showError);

function init(data) {
  $('worker').innerHTML =
    '<option value="">작업자 선택</option>' +
    data.workers
      .map(name =>
        `<option value="${esc(name)}">${esc(name)}</option>`
      )
      .join('');

  const savedWorker = localStorage.getItem('capaWorker');

  if (savedWorker && data.workers.includes(savedWorker)) {
    $('worker').value = savedWorker;
  }

  $('actions').innerHTML = data.actions
    .map(action =>
      `<button type="button"
               class="action"
               data-action="${esc(action)}">${esc(action)}</button>`
    )
    .join('');

  document.querySelectorAll('.action').forEach(button => {
    button.onclick = () => selectAction(button.dataset.action);
  });

  if (data.actions.includes(selectedAction)) {
    selectAction(selectedAction);
  }
}

function selectAction(action) {
  selectedAction = action;

  document.querySelectorAll('.action').forEach(button => {
    button.classList.toggle(
      'selected',
      button.dataset.action === action
    );
  });

  const requiresProcess =
    action === '작업 중단' || action === '작업 재시작';

  $('processBox').classList.toggle('hidden', !requiresProcess);
  $('reasonBox').classList.toggle(
    'hidden',
    action !== '작업 중단'
  );
}

$('scanButton').onclick = startScanner;
$('stopButton').onclick = stopScanner;
$('saveButton').onclick = save;

async function startScanner() {
  if (scannerRunning) return;

  scanCompleted = false;

  $('readerWrap').classList.remove('hidden');
  $('scanButton').classList.add('hidden');
  $('stopButton').classList.remove('hidden');

  showMessage('카메라를 준비하고 있습니다...', true);

  scanner = new Html5Qrcode('reader', {
    formatsToSupport: BARCODE_FORMATS,
    verbose: false
  });

  const config = {
    fps: 15,

    /* 휴대폰 화면에 맞춰 인식 영역 자동 계산 */
    qrbox: function(viewWidth, viewHeight) {
      const width = Math.floor(Math.min(viewWidth * 0.88, 430));
      const height = Math.floor(
        Math.min(Math.max(width * 0.28, 90), 125)
      );

      return {
        width: width,
        height: height
      };
    },

    disableFlip: false,

    experimentalFeatures: {
      useBarCodeDetectorIfSupported: true
    }
  };

  try {
    await scanner.start(
      {
        facingMode: {
          ideal: 'environment'
        }
      },
      config,
      onScanSuccess,
      function() {}
    );

    scannerRunning = true;
    showMessage('카메라 실행 완료\n노란색 사각형에 바코드를 맞춰 주세요.', true);

  } catch (firstError) {
    /* 후면 카메라 지정이 실패하면 카메라 목록으로 다시 시도 */
    try {
      const cameras = await Html5Qrcode.getCameras();

      if (!cameras || cameras.length === 0) {
        throw new Error('사용 가능한 카메라를 찾을 수 없습니다.');
      }

      let selectedCamera = cameras[cameras.length - 1];

      const rearCamera = cameras.find(camera =>
        /back|rear|environment|후면|뒷면/i.test(camera.label)
      );

      if (rearCamera) {
        selectedCamera = rearCamera;
      }

      await scanner.start(
        selectedCamera.id,
        config,
        onScanSuccess,
        function() {}
      );

      scannerRunning = true;
      showMessage('카메라 실행 완료\n노란색 사각형에 바코드를 맞춰 주세요.', true);

    } catch (secondError) {
      await resetScanner();

      showError(
        '카메라를 실행할 수 없습니다.\n' +
        '카카오톡 화면을 외부 브라우저로 열고 카메라 권한을 허용해 주세요.\n\n' +
        String(secondError)
      );
    }
  }
}

function onScanSuccess(decodedText) {
  if (scanCompleted) return;

  const value = norm(decodedText);
  if (!value) return;

  scanCompleted = true;
  $('barcode').value = value;

  showMessage('바코드 인식 완료: ' + value, true);

  if (navigator.vibrate) {
    navigator.vibrate(150);
  }

  setTimeout(stopScanner, 250);
}

async function stopScanner() {
  if (!scanner) {
    resetCameraButtons();
    return;
  }

  try {
    if (scannerRunning) {
      await scanner.stop();
    }
  } catch (error) {
    console.log(error);
  }

  try {
    scanner.clear();
  } catch (error) {
    console.log(error);
  }

  scanner = null;
  scannerRunning = false;
  resetCameraButtons();
}

async function resetScanner() {
  try {
    if (scanner && scannerRunning) {
      await scanner.stop();
    }
  } catch (error) {}

  try {
    if (scanner) scanner.clear();
  } catch (error) {}

  scanner = null;
  scannerRunning = false;
  resetCameraButtons();
}

function resetCameraButtons() {
  $('readerWrap').classList.add('hidden');
  $('scanButton').classList.remove('hidden');
  $('stopButton').classList.add('hidden');
}

function save() {
  const payload = {
    api: 'record',
    workerName: $('worker').value,
    action: selectedAction,
    barcode: norm($('barcode').value),
    process: $('process').value,
    reason: $('reason').value
  };

  if (!payload.workerName) {
    return showError('작업자를 선택해 주세요.');
  }

  if (!payload.action) {
    return showError('작업 종류를 선택해 주세요.');
  }

  if (!payload.barcode) {
    return showError('바코드를 스캔하거나 입력해 주세요.');
  }

  if (
    (payload.action === '작업 중단' ||
     payload.action === '작업 재시작') &&
    !payload.process
  ) {
    return showError('공정을 선택해 주세요.');
  }

  if (
    payload.action === '작업 중단' &&
    !payload.reason
  ) {
    return showError('중단 사유를 선택해 주세요.');
  }

  localStorage.setItem('capaWorker', payload.workerName);

  $('saveButton').disabled = true;
  $('saveButton').textContent = '저장 중...';

  jsonp(payload)
    .then(result => {
      if (!result.ok) throw new Error(result.error);

      const data = result.data;

      showMessage(
        `${data.message}\n` +
        `${data.time}\n` +
        `${data.workerName} / ${data.managementNo}\n` +
        `${data.barcode}`,
        true
      );

      $('barcode').value = '';
    })
    .catch(showError)
    .finally(() => {
      $('saveButton').disabled = false;
      $('saveButton').textContent = '작업 기록 저장';
    });
}

function norm(value) {
  return String(value || '')
    .trim()
    .replace(/\s+/g, '')
    .toUpperCase();
}

function showMessage(text, success) {
  $('message').textContent = text;
  $('message').className =
    'card ' + (success ? 'ok' : 'error');
}

function showError(error) {
  showMessage(
    error && error.message ? error.message : String(error),
    false
  );
}

function esc(value) {
  return String(value).replace(
    /[&<>'"]/g,
    character => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      "'": '&#39;',
      '"': '&quot;'
    }[character])
  );
}
</script>
</body>
</html>
