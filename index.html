<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>상일비전 CAPA 바코드 스캔</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f4f6f8;color:#17202a;font-family:Arial,"Noto Sans KR",sans-serif}main{max-width:560px;margin:auto;padding:18px 14px 40px}h1{margin:0 0 6px;font-size:24px}.sub,.hint{color:#637083;font-size:14px}.card{background:#fff;padding:16px;margin-bottom:14px;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.06)}label{display:block;margin-bottom:7px;font-weight:700}select,input{width:100%;min-height:48px;padding:10px 12px;border:1px solid #cfd6df;border-radius:9px;background:#fff;font-size:17px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}button{min-height:48px;border:0;border-radius:9px;font-size:16px;font-weight:700;cursor:pointer}.action{background:#edf1f5}.action.selected{background:#fee500;outline:2px solid #111}.scan{width:100%;margin-top:10px;background:#293f8f;color:#fff}.save{width:100%;background:#111;color:#fff}.hidden{display:none!important}#reader{width:100%;margin-top:10px;overflow:hidden;border-radius:10px}#message{white-space:pre-line;line-height:1.55}.ok{background:#e9f8ef;color:#176b3a}.error{background:#fff0f0;color:#a12626}
  </style>
</head>
<body>
<main>
  <h1>CAPA 바코드 스캔</h1>
  <p class="sub">작업자와 작업을 선택한 뒤 제품 바코드를 조준하세요.</p>
  <section class="card"><label for="worker">작업자</label><select id="worker"><option>불러오는 중...</option></select></section>
  <section class="card"><label>작업 종류</label><div id="actions" class="actions"></div></section>
  <section id="processBox" class="card hidden"><label for="process">중단·재시작 공정</label><select id="process"><option value="">공정 선택</option><option value="포선">포선</option><option value="외장">외장</option></select></section>
  <section id="reasonBox" class="card hidden"><label for="reason">중단 사유</label><select id="reason"><option value="">중단 사유 선택</option><option>자재 대기</option><option>사양 확인</option><option>품질 확인</option><option>설비·공구 문제</option><option>타 작업 지원</option><option>작업자 이석</option><option>기타</option></select></section>
  <section class="card">
    <label for="barcode">제품 바코드</label><input id="barcode" placeholder="예: Q829Z23S#1" autocomplete="off" autocapitalize="characters">
    <div id="reader" class="hidden"></div>
    <button id="scanButton" class="scan" type="button">카메라로 바코드 스캔</button>
    <button id="stopButton" class="scan hidden" type="button">카메라 닫기</button>
    <p class="hint">라벨의 상단 바코드를 화면 중앙에 가로로 맞추세요.</p>
  </section>
  <button id="saveButton" class="save" type="button">작업 기록 저장</button>
  <section id="message" class="card hidden"></section>
</main>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbzyGn4TJU62xu_BxCyjsfHpba0KML1mqLzpQ3t4j57FUuMMNcYlzk6_t6gyEpexWVdhYg/exec';
const $=id=>document.getElementById(id);let selectedAction=new URLSearchParams(location.search).get('action')||'';let scanner=null;
function jsonp(params){return new Promise((resolve,reject)=>{const cb='capaCb'+Date.now()+Math.random().toString(36).slice(2);const s=document.createElement('script');const timer=setTimeout(()=>done(new Error('서버 응답 시간이 초과되었습니다.')),15000);function done(v){clearTimeout(timer);delete window[cb];s.remove();v instanceof Error?reject(v):resolve(v)}window[cb]=data=>done(data);s.onerror=()=>done(new Error('Google 시트 서버에 연결하지 못했습니다.'));s.src=API_URL+'?'+new URLSearchParams({...params,callback:cb});document.body.appendChild(s)})}
jsonp({api:'initial'}).then(data=>{if(!data.ok)throw new Error(data.error);init(data.data)}).catch(showError);
function init(data){$('worker').innerHTML='<option value="">작업자 선택</option>'+data.workers.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('');const saved=localStorage.getItem('capaWorker');if(saved&&data.workers.includes(saved))$('worker').value=saved;$('actions').innerHTML=data.actions.map(a=>`<button type="button" class="action" data-action="${esc(a)}">${esc(a)}</button>`).join('');document.querySelectorAll('.action').forEach(b=>b.onclick=()=>selectAction(b.dataset.action));if(data.actions.includes(selectedAction))selectAction(selectedAction)}
function selectAction(a){selectedAction=a;document.querySelectorAll('.action').forEach(b=>b.classList.toggle('selected',b.dataset.action===a));const p=a==='작업 중단'||a==='작업 재시작';$('processBox').classList.toggle('hidden',!p);$('reasonBox').classList.toggle('hidden',a!=='작업 중단')}
$('scanButton').onclick=startScanner;$('stopButton').onclick=stopScanner;$('saveButton').onclick=save;
function startScanner(){$('reader').classList.remove('hidden');$('scanButton').classList.add('hidden');$('stopButton').classList.remove('hidden');scanner=new Html5Qrcode('reader');scanner.start({facingMode:'environment'},{fps:12,qrbox:{width:300,height:110},formatsToSupport:[Html5QrcodeSupportedFormats.CODE_128]},text=>{$('barcode').value=norm(text);showMessage('바코드 인식 완료: '+$('barcode').value,true);stopScanner()},()=>{}).catch(e=>{stopScanner();showError('카메라를 실행할 수 없습니다. 브라우저 카메라 권한을 허용해 주세요.\n'+e)})}
function stopScanner(){if(scanner){scanner.stop().catch(()=>{}).finally(()=>{scanner.clear();scanner=null})}$('reader').classList.add('hidden');$('scanButton').classList.remove('hidden');$('stopButton').classList.add('hidden')}
function save(){const p={api:'record',workerName:$('worker').value,action:selectedAction,barcode:norm($('barcode').value),process:$('process').value,reason:$('reason').value};if(!p.workerName)return showError('작업자를 선택해 주세요.');if(!p.action)return showError('작업 종류를 선택해 주세요.');if(!p.barcode)return showError('바코드를 스캔하거나 입력해 주세요.');if((p.action==='작업 중단'||p.action==='작업 재시작')&&!p.process)return showError('공정을 선택해 주세요.');if(p.action==='작업 중단'&&!p.reason)return showError('중단 사유를 선택해 주세요.');localStorage.setItem('capaWorker',p.workerName);$('saveButton').disabled=true;$('saveButton').textContent='저장 중...';jsonp(p).then(r=>{if(!r.ok)throw new Error(r.error);const x=r.data;showMessage(`${x.message}\n${x.time}\n${x.workerName} / ${x.managementNo}\n${x.barcode}`,true);$('barcode').value=''}).catch(showError).finally(()=>{$('saveButton').disabled=false;$('saveButton').textContent='작업 기록 저장'})}
function norm(v){return String(v||'').trim().replace(/\s+/g,'').toUpperCase()}function showMessage(t,ok){$('message').textContent=t;$('message').className='card '+(ok?'ok':'error')}function showError(e){showMessage(e&&e.message?e.message:String(e),false)}function esc(v){return String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
</script>
</body>
</html>
