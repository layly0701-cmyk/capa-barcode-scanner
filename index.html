<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
  >

  <title>상일비전 CAPA 바코드 스캔</title>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f4f6f8;
      color: #17202a;
      font-family: Arial, "Noto Sans KR", sans-serif;
    }

    main {
      max-width: 560px;
      margin: auto;
      padding: 18px 14px 40px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .sub,
    .hint {
      color: #637083;
      font-size: 14px;
      line-height: 1.55;
    }

    .card {
      background: #fff;
      padding: 16px;
      margin-bottom: 14px;
      border-radius: 14px;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .06);
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
    }

    select,
    input {
      width: 100%;
      min-height: 48px;
      padding: 10px 12px;
      border: 1px solid #cfd6df;
      border-radius: 9px;
      background: #fff;
      font-size: 17px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 9px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: .5;
      cursor: default;
    }

    .action {
      background: #edf1f5;
      color: #17202a;
    }

    .action.selected {
      background: #fee500;
      color: #111;
      outline: 2px solid #111;
    }

    .scan {
      width: 100%;
      margin-top: 10px;
      background: #293f8f;
      color: #fff;
    }

    .photo {
      width: 100%;
      margin-top: 10px;
      background: #5d6b80;
      color: #fff;
    }

    .save {
      width: 100%;
      background: #111;
      color: #fff;
    }

    .login-button {
      width: 100%;
      margin-top: 12px;
      background: #fee500;
      color: #111;
    }

    .logout {
      float: right;
      min-height: 34px;
      padding: 4px 10px;
      background: #e8edf3;
      color: #334155;
      font-size: 13px;
    }

    .hidden {
      display: none !important;
    }

    #reader {
      width: 100%;
      min-height: 250px;
      margin-top: 10px;
      overflow: hidden;
      border: 3px solid #fee500;
      border-radius: 10px;
      background: #111;
    }

    #reader video {
      width: 100% !important;
      object-fit: cover;
    }

    #fileReader {
      display: none;
    }

    #message {
      white-space: pre-line;
      line-height: 1.55;
    }

    .ok {
      background: #e9f8ef;
      color: #176b3a;
    }

    .error {
      background: #fff0f0;
      color: #a12626;
    }

    .login-info {
      padding: 12px;
      margin-bottom: 14px;
      border-radius: 9px;
      background: #eef3f8;
      color: #475569;
      font-size: 14px;
      line-height: 1.55;
    }
  </style>
</head>

<body>
<main>
  <section id="loginSection">
    <h1>CAPA 작업자 인증</h1>
    <p class="sub">관리자가 안내한 공용 비밀번호를 입력해 주세요.</p>

    <section class="card">
      <label for="accessPassword">접속 비밀번호</label>

      <input
        id="accessPassword"
        type="password"
        placeholder="비밀번호 입력"
        autocomplete="current-password"
      >

      <button id="loginButton" class="login-button" type="button">
        CAPA 스캔 시작
      </button>
    </section>

    <div class="login-info">
      인증 완료 후 이 휴대전화에서는 30일 동안 비밀번호 입력을 생략할 수 있습니다.
    </div>

    <section id="loginMessage" class="card error hidden"></section>
  </section>

  <section id="appSection" class="hidden">
    <button id="logoutButton" class="logout" type="button">
      인증 초기화
    </button>

    <h1>CAPA 바코드 스캔</h1>
    <p class="sub">작업자와 작업을 선택한 뒤 제품 바코드를 조준하세요.</p>

    <section class="card">
      <label for="worker">작업자</label>
      <select id="worker">
        <option value="">불러오는 중...</option>
      </select>
    </section>

    <section class="card">
      <label>작업 종류</label>
      <div id="actions" class="actions"></div>
    </section>

    <section id="processBox" class="card hidden">
      <label for="process">중단·재시작 공정</label>

      <select id="process">
        <option value="">공정 선택</option>
        <option value="포선">포선</option>
        <option value="외장">외장</option>
      </select>
    </section>

    <section id="reasonBox" class="card hidden">
      <label for="reason">중단 사유</label>

      <select id="reason">
        <option value="">중단 사유 선택</option>
        <option value="자재 대기">자재 대기</option>
        <option value="사양 확인">사양 확인</option>
        <option value="품질 확인">품질 확인</option>
        <option value="설비·공구 문제">설비·공구 문제</option>
        <option value="타 작업 지원">타 작업 지원</option>
        <option value="작업자 이석">작업자 이석</option>
        <option value="기타">기타</option>
      </select>
    </section>

    <section class="card">
      <label for="barcode">제품 바코드</label>

      <input
        id="barcode"
        placeholder="예: Q829Z23S#1"
        autocomplete="off"
        autocapitalize="characters"
      >

      <div id="reader" class="hidden"></div>
      <div id="fileReader"></div>

      <button id="scanButton" class="scan" type="button">
        카메라로 바코드 스캔
      </button>

      <button id="stopButton" class="scan hidden" type="button">
        카메라 닫기
      </button>

      <button id="photoButton" class="photo" type="button">
        사진 촬영으로 바코드 읽기
      </button>

      <input
        id="photoInput"
        class="hidden"
        type="file"
        accept="image/*"
        capture="environment"
      >

      <p class="hint">
        라벨의 상단 바코드를 화면 중앙에 가로로 맞춰 주세요.
        실시간 스캔이 안 되면 사진 촬영 방식을 사용하세요.
      </p>
    </section>

    <button id="saveButton" class="save" type="button">
      작업 기록 저장
    </button>

    <section id="message" class="card hidden"></section>
  </section>
</main>

<script>
  const API_URL =
    'https://script.google.com/macros/s/AKfycbzyGn4TJU62xu_BxCyjsfHpba0KML1mqLzpQ3t4j57FUuMMNcYlzk6_t6gyEpexWVdhYg/exec';

  const TOKEN_KEY = 'capaAccessToken';
  const WORKER_KEY = 'capaWorker';

  const $ = id => document.getElementById(id);

  let selectedAction =
    new URLSearchParams(location.search).get('action') || '';

  let scanner = null;
  let scannerRunning = false;
  let scannerChanging = false;

  $('loginButton').onclick = login;
  $('logoutButton').onclick = logout;
  $('scanButton').onclick = startScanner;
  $('stopButton').onclick = stopScanner;
  $('photoButton').onclick = () => $('photoInput').click();
  $('photoInput').onchange = readPhoto;
  $('saveButton').onclick = save;

  $('accessPassword').addEventListener('keydown', event => {
    if (event.key === 'Enter') {
      login();
    }
  });

  startPage();

  function startPage() {
    const token = localStorage.getItem(TOKEN_KEY);

    if (!token) {
      showLogin();
      return;
    }

    showApp();
    loadInitialData();
  }

  function showLogin(message) {
    $('appSection').classList.add('hidden');
    $('loginSection').classList.remove('hidden');

    if (message) {
      $('loginMessage').textContent = message;
      $('loginMessage').classList.remove('hidden');
    } else {
      $('loginMessage').classList.add('hidden');
    }

    setTimeout(() => $('accessPassword').focus(), 100);
  }

  function showApp() {
    $('loginSection').classList.add('hidden');
    $('appSection').classList.remove('hidden');
  }

  async function login() {
    const password = $('accessPassword').value.trim();

    if (!password) {
      showLoginError('접속 비밀번호를 입력해 주세요.');
      return;
    }

    $('loginButton').disabled = true;
    $('loginButton').textContent = '인증 중...';

    try {
      const response = await jsonp({
        api: 'login',
        password: password
      });

      if (!response.ok) {
        throw new Error(response.error || '비밀번호 인증에 실패했습니다.');
      }

      if (!response.data || !response.data.token) {
        throw new Error('인증 토큰을 발급받지 못했습니다.');
      }

      localStorage.setItem(TOKEN_KEY, response.data.token);

      $('accessPassword').value = '';
      $('loginMessage').classList.add('hidden');

      showApp();
      await loadInitialData();
    } catch (error) {
      showLoginError(
        error && error.message
          ? error.message
          : String(error)
      );
    } finally {
      $('loginButton').disabled = false;
      $('loginButton').textContent = 'CAPA 스캔 시작';
    }
  }

  function logout() {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(WORKER_KEY);

    stopScanner();
    showLogin('이 휴대전화의 인증정보를 초기화했습니다.');
  }

  async function loadInitialData() {
    $('worker').innerHTML =
      '<option value="">불러오는 중...</option>';

    try {
      const data = await callApi({
        api: 'initial'
      });

      initializeApp(data);
    } catch (error) {
      handleApiError(error);
    }
  }

  function initializeApp(data) {
    $('worker').innerHTML =
      '<option value="">작업자 선택</option>' +
      data.workers
        .map(name =>
          `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`
        )
        .join('');

    const savedWorker = localStorage.getItem(WORKER_KEY);

    if (savedWorker && data.workers.includes(savedWorker)) {
      $('worker').value = savedWorker;
    }

    $('actions').innerHTML = data.actions
      .map(action =>
        `<button
          type="button"
          class="action"
          data-action="${escapeHtml(action)}"
        >${escapeHtml(action)}</button>`
      )
      .join('');

    document.querySelectorAll('.action').forEach(button => {
      button.onclick = () => selectAction(button.dataset.action);
    });

    if (data.actions.includes(selectedAction)) {
      selectAction(selectedAction);
    }
  }

  function selectAction(action) {
    selectedAction = action;

    document.querySelectorAll('.action').forEach(button => {
      button.classList.toggle(
        'selected',
        button.dataset.action === action
      );
    });

    const needsProcess =
      action === '작업 중단' ||
      action === '작업 재시작';

    $('processBox').classList.toggle('hidden', !needsProcess);
    $('reasonBox').classList.toggle(
      'hidden',
      action !== '작업 중단'
    );
  }

  async function startScanner() {
    if (scannerChanging || scannerRunning) {
      return;
    }

    scannerChanging = true;
    $('scanButton').disabled = true;

    try {
      $('reader').classList.remove('hidden');
      $('scanButton').classList.add('hidden');
      $('stopButton').classList.remove('hidden');

      scanner = new Html5Qrcode('reader');

      const config = {
        fps: 10,

        qrbox: function(viewWidth, viewHeight) {
          return {
            width: Math.floor(Math.min(viewWidth * 0.88, 360)),
            height: Math.floor(Math.min(viewHeight * 0.30, 130))
          };
        },

        aspectRatio: 1.7778,

        formatsToSupport: [
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.CODE_93
        ]
      };

const cameras = await Html5Qrcode.getCameras();

if (!cameras || cameras.length === 0) {
  throw new Error('사용 가능한 카메라를 찾을 수 없습니다.');
}

const rearCamera =
  cameras.find(camera =>
    /back|rear|environment|후면/i.test(camera.label || '')
  ) || cameras[cameras.length - 1];

await scanner.start(
  rearCamera.id,
  config,
  async decodedText => {
    $('barcode').value = normalizeBarcode(decodedText);

    showMessage(
      '바코드 인식 완료: ' + $('barcode').value,
      true
    );

    await stopScanner();
  },
  () => {}
);

      scannerRunning = true;
    } catch (error) {
      await resetScanner();

      showError(
        '카메라를 실행할 수 없습니다.\n' +
        '브라우저 카메라 권한을 확인하거나 사진 촬영 방식을 사용해 주세요.\n' +
        String(error)
      );
    } finally {
      scannerChanging = false;
      $('scanButton').disabled = false;
    }
  }

  async function stopScanner() {
    if (scannerChanging) {
      return;
    }

    scannerChanging = true;

    try {
      if (scanner && scannerRunning) {
        await scanner.stop();
      }
    } catch (error) {
      console.log(error);
    } finally {
      await resetScanner();
      scannerChanging = false;
    }
  }

  async function resetScanner() {
    scannerRunning = false;

    if (scanner) {
      try {
        scanner.clear();
      } catch (error) {
        console.log(error);
      }

      scanner = null;
    }

    $('reader').classList.add('hidden');
    $('scanButton').classList.remove('hidden');
    $('stopButton').classList.add('hidden');
  }

  async function readPhoto(event) {
    const file =
      event.target.files &&
      event.target.files.length
        ? event.target.files[0]
        : null;

    if (!file) {
      return;
    }

    $('photoButton').disabled = true;
    $('photoButton').textContent = '사진 판독 중...';

    let fileScanner = null;

    try {
      fileScanner = new Html5Qrcode('fileReader');

      const decodedText = await fileScanner.scanFile(file, true);

      $('barcode').value = normalizeBarcode(decodedText);

      showMessage(
        '사진 바코드 인식 완료: ' + $('barcode').value +
        '\n저장 전에 실제 라벨 번호와 일치하는지 확인해 주세요.',
        true
      );
    } catch (error) {
      showError(
        '사진에서 바코드를 인식하지 못했습니다.\n' +
        '바코드가 선명하게 보이도록 가까이 촬영하거나 직접 입력해 주세요.'
      );
    } finally {
      if (fileScanner) {
        try {
          fileScanner.clear();
        } catch (error) {
          console.log(error);
        }
      }

      $('photoInput').value = '';
      $('photoButton').disabled = false;
      $('photoButton').textContent = '사진 촬영으로 바코드 읽기';
    }
  }

  async function save() {
    const payload = {
      api: 'record',
      workerName: $('worker').value,
      action: selectedAction,
      barcode: normalizeBarcode($('barcode').value),
      process: $('process').value,
      reason: $('reason').value
    };

    if (!payload.workerName) {
      showError('작업자를 선택해 주세요.');
      return;
    }

    if (!payload.action) {
      showError('작업 종류를 선택해 주세요.');
      return;
    }

    if (!payload.barcode) {
      showError('바코드를 스캔하거나 입력해 주세요.');
      return;
    }

    if (
      (
        payload.action === '작업 중단' ||
        payload.action === '작업 재시작'
      ) &&
      !payload.process
    ) {
      showError('중단 또는 재시작할 공정을 선택해 주세요.');
      return;
    }

    if (
      payload.action === '작업 중단' &&
      !payload.reason
    ) {
      showError('중단 사유를 선택해 주세요.');
      return;
    }

    localStorage.setItem(WORKER_KEY, payload.workerName);

    $('saveButton').disabled = true;
    $('saveButton').textContent = '저장 중...';

    try {
      const result = await callApi(payload);

      showMessage(
        result.message + '\n' +
        result.time + '\n' +
        result.workerName + ' / ' + result.managementNo + '\n' +
        result.barcode,
        true
      );

      $('barcode').value = '';
    } catch (error) {
      handleApiError(error);
    } finally {
      $('saveButton').disabled = false;
      $('saveButton').textContent = '작업 기록 저장';
    }
  }

  async function callApi(params) {
    const token = localStorage.getItem(TOKEN_KEY);

    if (!token) {
      throw new Error('LOGIN_REQUIRED');
    }

    const response = await jsonp({
      ...params,
      token: token
    });

    if (!response.ok) {
      throw new Error(
        response.error || '서버 요청에 실패했습니다.'
      );
    }

    return response.data;
  }

  function handleApiError(error) {
    const message =
      error && error.message
        ? error.message
        : String(error);

    if (
      message === 'LOGIN_REQUIRED' ||
      message.includes('LOGIN_REQUIRED')
    ) {
      localStorage.removeItem(TOKEN_KEY);

      showLogin(
        '인증기간이 만료되었습니다. 공용 비밀번호를 다시 입력해 주세요.'
      );

      return;
    }

    showError(message);
  }

  function jsonp(params) {
    return new Promise((resolve, reject) => {
      const callbackName =
        'capaCallback' +
        Date.now() +
        Math.random().toString(36).slice(2);

      const script = document.createElement('script');

      const timeout = setTimeout(() => {
        finish(
          new Error('서버 응답 시간이 초과되었습니다.')
        );
      }, 15000);

      function finish(value) {
        clearTimeout(timeout);

        try {
          delete window[callbackName];
        } catch (error) {
          window[callbackName] = undefined;
        }

        script.remove();

        if (value instanceof Error) {
          reject(value);
        } else {
          resolve(value);
        }
      }

      window[callbackName] = data => finish(data);

      script.onerror = () => {
        finish(
          new Error('Google 시트 서버에 연결하지 못했습니다.')
        );
      };

      const query = new URLSearchParams();

      Object.keys(params).forEach(key => {
        const value = params[key];

        if (
          value !== undefined &&
          value !== null
        ) {
          query.set(key, value);
        }
      });

      query.set('callback', callbackName);

      script.src = API_URL + '?' + query.toString();
      document.body.appendChild(script);
    });
  }

  function normalizeBarcode(value) {
    return String(value || '')
      .trim()
      .replace(/\s+/g, '')
      .toUpperCase();
  }

  function showMessage(text, success) {
    $('message').textContent = text;
    $('message').className =
      'card ' + (success ? 'ok' : 'error');
  }

  function showError(error) {
    const text =
      error && error.message
        ? error.message
        : String(error);

    showMessage(text, false);
  }

  function showLoginError(text) {
    $('loginMessage').textContent = text;
    $('loginMessage').className = 'card error';
  }

  function escapeHtml(value) {
    return String(value).replace(
      /[&<>'"]/g,
      character => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        "'": '&#39;',
        '"': '&quot;'
      }[character])
    );
  }
</script>
</body>
</html>
